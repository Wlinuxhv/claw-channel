pluginManagement {
    repositories {
        google()
        mavenCentral()
        gradlePluginPortal()
    }
}
dependencyResolutionManagement {
    repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
    repositories {
        google()
        mavenCentral()
        maven { url 'https://jitpack.io' }
    }
}

// Disable JDK image transform for AGP 8.x with JDK 21
gradle.ext.androidEnableJdkImageTransform = false

rootProject.name = "ClawChannel"
include ':app'
