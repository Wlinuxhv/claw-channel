name: 📦 Release Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (e.g., v1.0.0)'
        required: true
        type: string

jobs:
  android-release:
    name: 📱 Build Android Release
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
      
      - name: 📋 Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle
      
      - name: 📱 Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          api-level: 34
          build-tools: 34.0.0
      
      - name: 🔧 Grant execute permission for gradlew
        run: chmod +x Android/gradlew
      
      - name: 🏗️ Build Release APK
        run: cd Android && ./gradlew assembleRelease --stacktrace
      
      - name: 📦 Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: claw-channel-release
          path: Android/app/build/outputs/apk/release/*.apk
          retention-days: 30

  go-release:
    name: 🐹 Build Go Server Release
    runs-on: ubuntu-latest
    timeout-minutes: 15
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
      
      - name: 📋 Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
      
      - name: 🏗️ Build All Platforms
        run: |
          cd Server
          # Linux
          GOOS=linux GOARCH=amd64 go build -o server-linux-amd64 -ldflags="-s -w" ./cmd/server
          GOOS=linux GOARCH=arm64 go build -o server-linux-arm64 -ldflags="-s -w" ./cmd/server
          
          # macOS
          GOOS=darwin GOARCH=amd64 go build -o server-darwin-amd64 -ldflags="-s -w" ./cmd/server
          GOOS=darwin GOARCH=arm64 go build -o server-darwin-arm64 -ldflags="-s -w" ./cmd/server
          
          # Windows
          GOOS=windows GOARCH=amd64 go build -o server-windows-amd64.exe -ldflags="-s -w" ./cmd/server
          GOOS=windows GOARCH=arm64 go build -o server-windows-arm64.exe -ldflags="-s -w" ./cmd/server
      
      - name: 📦 Upload Binaries
        uses: actions/upload-artifact@v4
        with:
          name: server-binaries
          path: |
            Server/server-linux-*
            Server/server-darwin-*
            Server/server-windows-*
          retention-days: 30

  create-release:
    name: 📝 Create GitHub Release
    runs-on: ubuntu-latest
    needs: [android-release, go-release]
    permissions:
      contents: write
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
      
      - name: 📥 Download Android APK
        uses: actions/download-artifact@v4
        with:
          name: claw-channel-release
          path: ./artifacts/android
      
      - name: 📥 Download Server Binaries
        uses: actions/download-artifact@v4
        with:
          name: server-binaries
          path: ./artifacts/server
      
      - name: 📝 Create Release
        uses: softprops/action-gh-release@v1
        with:
          name: Release ${{ github.ref_name }}
          body: |
            ## 🦞 Claw Channel ${{ github.ref_name }}
            
            ### 📱 Android Client
            - claw-channel-release.apk
            
            ### 🐹 Go Server Binaries
            - server-linux-amd64
            - server-linux-arm64
            - server-darwin-amd64 (Intel Mac)
            - server-darwin-arm64 (M1/M2 Mac)
            - server-windows-amd64.exe
            - server-windows-arm64.exe
            
            ### 📋 Installation
            
            #### Android
            1. Download APK
            2. Install on Android device
            
            #### Server
            ```bash
            # Linux
            chmod +x server-linux-amd64
            ./server-linux-amd64
            
            # macOS
            chmod +x server-darwin-arm64
            ./server-darwin-arm64
            
            # Windows
            server-windows-amd64.exe
            ```
            
            ### 🐛 Bug Fixes
            - TBD
            
            ### ✨ New Features
            - TBD
          files: |
            ./artifacts/android/*.apk
            ./artifacts/server/*
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
