name: 🤖 Android Build

on:
  push:
    branches: [ "main", "master", "develop" ]
    paths:
      - 'Android/**'
      - '.github/workflows/android-build.yml'
  pull_request:
    branches: [ "main", "master", "develop" ]
    paths:
      - 'Android/**'
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type'
        required: true
        default: 'debug'
        type: choice
        options:
          - debug
          - release

jobs:
  build:
    name: 🛠️ Build Android APK
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: 📋 Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle
      
      - name: 📱 Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: "platform-tools platforms;android-34 build-tools;34.0.0"
      
      - name: 🔧 Grant execute permission for gradlew
        run: chmod +x Android/gradlew
      
      - name: 🧹 Clean build
        run: cd Android && ./gradlew clean
      
      - name: 🏗️ Build Debug APK
        run: cd Android && ./gradlew assembleDebug --stacktrace
      
      - name: 📦 Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: claw-channel-debug
          path: Android/app/build/outputs/apk/debug/*.apk
          retention-days: 30
          if-no-files-found: warn
      
      - name: 📊 Build Summary
        run: |
          echo "## 📱 Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ Build completed successfully!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Build Info" >> $GITHUB_STEP_SUMMARY
          echo "- Branch: ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- Commit: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- Build Time: $(date '+%Y-%m-%d %H:%M:%S')" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### APK Files" >> $GITHUB_STEP_SUMMARY
          ls -lh Android/app/build/outputs/apk/debug/*.apk 2>/dev/null >> $GITHUB_STEP_SUMMARY || echo "No APK files found" >> $GITHUB_STEP_SUMMARY

  test:
    name: 🧪 Run Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: build
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
      
      - name: 📋 Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle
      
      - name: 📱 Set up Android SDK
        uses: android-actions/setup-android@v3
      
      - name: 🔧 Grant execute permission for gradlew
        run: chmod +x Android/gradlew
      
      - name: 🧪 Run Unit Tests
        run: cd Android && ./gradlew testDebugUnitTest --stacktrace
      
      - name: 📊 Test Report
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Unit Tests
          path: Android/app/build/test-results/testDebugUnitTest/*.xml
          reporter: java-junit
